name: CI
on:
  push: { branches: [main] }
  pull_request:

# Minimal default GITHUB_TOKEN permissions for every job; clippy-sarif overrides
# with the security-events write it needs to upload SARIF.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: nextest }
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo nextest run --locked --workspace --profile ci
      # nextest does not run doctests — run them separately (currently none, but this
      # keeps any future `///` examples covered).
      - run: cargo test --locked --workspace --doc
      - name: Parser differential oracle (libpg_query)
        run: cargo nextest run --locked -p pgparser --features oracle --profile ci
      - uses: EmbarkStudios/cargo-deny-action@v2
        with: { command: check bans licenses }
      - run: ./scripts/check-no-native.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "llvm-tools-preview" }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: "cargo-binstall, nextest" }
      # Cache the cargo-llvm-cov binary so we skip even the (fast) binstall on a
      # hit; bump the key suffix to force a tool refresh.
      - name: Cache cargo-llvm-cov
        id: cache-llvm-cov
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: tool-cargo-llvm-cov-${{ runner.os }}-1
      - name: Install cargo-llvm-cov (prebuilt)
        if: steps.cache-llvm-cov.outputs.cache-hit != 'true'
        run: cargo binstall -y cargo-llvm-cov
      - name: Generate coverage (lcov)
        # Run tests under nextest (respects .config/nextest.toml concurrency groups).
        # The `ci` nextest profile is selected via NEXTEST_PROFILE to avoid clashing
        # with cargo-llvm-cov's own `--profile` flag.
        env:
          NEXTEST_PROFILE: ci
        run: cargo llvm-cov nextest --locked --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  conformance:
    runs-on: ubuntu-latest
    services:
      oracle:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 54320:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install psql 18 (pgdg)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update && sudo apt-get install -y postgresql-client-18
      - run: cargo build --locked -p crabgresql -p conformance
      - run: ./scripts/psql-smoke.sh
      - name: Durable restart smoke
        run: ./scripts/durable-restart-smoke.sh
      - name: Run conformance harness
        run: |
          ./target/debug/crabgresql --listen 127.0.0.1:54333 &
          sleep 2
          ./target/debug/conformance \
            --oracle-url "host=127.0.0.1 port=54320 user=postgres dbname=postgres" \
            --subject-url "host=127.0.0.1 port=54333 user=crab dbname=crab" \
            --corpus crates/conformance/corpus \
            --out parity.json --summary parity.md
      - run: cat parity.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: parity-report
          path: |
            parity.json
            parity.md

  property:
    name: Property tests (proptest, high case count)
    runs-on: ubuntu-latest
    env:
      # 4x the proptest default (256) so the property suite is a real gate.
      PROPTEST_CASES: "1024"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: nextest }
      - run: cargo nextest run --locked -p kv -p pgparser -p pgwire -p pgtypes -p mvcc -p catalog --profile ci

  fuzz-smoke:
    name: Fuzz smoke (cargo-fuzz, bounded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      # The fuzz crate is its own (detached) workspace, so cache fuzz/target keyed
      # on fuzz/Cargo.lock — this is where the instrumented build artifacts live.
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "fuzz" }
      - uses: taiki-e/install-action@v2
        with: { tool: cargo-binstall }
      - name: Cache cargo-fuzz
        id: cache-fuzz
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: tool-cargo-fuzz-${{ runner.os }}-1
      # The cargo-fuzz prebuilt is musl; on its own it would default the fuzz
      # build to x86_64-unknown-linux-musl (no std installed + sanitizer is
      # incompatible with static libc). The explicit --target below overrides
      # that, so the fast prebuilt builds for the gnu host correctly.
      - name: Install cargo-fuzz (prebuilt)
        if: steps.cache-fuzz.outputs.cache-hit != 'true'
        run: cargo binstall -y cargo-fuzz
      - name: Build all fuzz targets
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu
      - name: Smoke-run each target (bounded)
        run: |
          for t in parse_sql wire_decode decode_row decode_key; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run --target x86_64-unknown-linux-gnu "$t" -- -max_total_time=20 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  kafka-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy" }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: nextest }
      - run: cargo clippy --locked -p kafka_fdw -p crabgresql --features kafka --all-targets -- -D warnings
      - run: cargo nextest run --locked -p kafka_fdw --features kafka --profile ci

  clippy-sarif:
    name: Clippy (SARIF code scanning)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: cargo-binstall }
      - name: Install clippy-sarif + sarif-fmt (prebuilt)
        run: cargo binstall -y clippy-sarif sarif-fmt
      - name: Run clippy → SARIF
        run: cargo clippy --all-features --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
        continue-on-error: true

  pr-gate:
    runs-on: ubuntu-latest
    needs: [check, coverage, conformance, property, fuzz-smoke, clippy-sarif, kafka-check]
    if: always()
    steps:
      - name: All jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
