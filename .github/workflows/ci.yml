name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo test --locked --workspace
      - name: Parser differential oracle (libpg_query)
        run: cargo test --locked -p pgparser --features oracle
      - uses: EmbarkStudios/cargo-deny-action@v2
        with: { command: check bans licenses }
      - run: ./scripts/check-no-native.sh

  conformance:
    runs-on: ubuntu-latest
    services:
      oracle:
        image: postgres:18
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 54320:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install psql 18 (pgdg)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update && sudo apt-get install -y postgresql-client-18
      - run: cargo build --locked -p crabgresql -p conformance
      - run: ./scripts/psql-smoke.sh
      - name: Durable restart smoke
        run: ./scripts/durable-restart-smoke.sh
      - name: Run conformance harness
        run: |
          ./target/debug/crabgresql --listen 127.0.0.1:54333 &
          sleep 2
          ./target/debug/conformance \
            --oracle-url "host=127.0.0.1 port=54320 user=postgres dbname=postgres" \
            --subject-url "host=127.0.0.1 port=54333 user=crab dbname=crab" \
            --corpus crates/conformance/corpus \
            --out parity.json --summary parity.md
      - run: cat parity.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: |
            parity.json
            parity.md
