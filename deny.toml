[licenses]
allow = [
    "PostgreSQL",
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib",
    "CDLA-Permissive-2.0", "MPL-2.0",
    # fjall transitive deps:
    "0BSD",    # varint-rs (lsm-tree <- fjall)
    "BSL-1.0", # xxhash-rust (lsm-tree <- fjall)
]

[bans]
multiple-versions = "warn"
deny = [
    { crate = "ring" },
    { crate = "aws-lc-rs" },
    { crate = "aws-lc-sys" },
    { crate = "openssl" },
    { crate = "openssl-sys" },
    { crate = "cc" },
    { crate = "cmake" },
    { crate = "pkg-config" },
    { crate = "libz-sys" },
    { crate = "zstd-sys" },
    { crate = "libsqlite3-sys" },
]
