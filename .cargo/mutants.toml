# cargo-mutants configuration. See <https://mutants.rs/>.
#
# Mutation testing checks our *tests*, not just our code. Coverage proves a line
# RAN; a mutant proves a line MATTERS: cargo-mutants makes a small behavioral
# change to the source (e.g. `a + b` -> `a - b`, `<` -> `<=`, or replaces a
# function body with a default return) and reruns the tests. A mutant the tests
# still pass on ("missed" / survived) is a real gap — a behavior change no test
# would catch. CI runs this per-subsystem on a schedule, not on the PR critical
# path (it reruns the suite once per mutant); see .github/workflows/mutants.yml.

# Run tests under nextest, matching the rest of CI (and picking up the
# .config/nextest.toml concurrency caps). nextest's default fail-fast=true is
# exactly what we want here: the first failing test kills the mutant, so a caught
# mutant stops early instead of running the whole suite.
test_tool = "nextest"
profile = "mutants"

# A mutant only needs the tests of the package it was generated in. Running the
# whole workspace per mutant would drag the slow, timing-sensitive distributed
# suites (cluster / crabgresql) into every single mutant; scoping to the mutated
# package keeps a subsystem run fast, focused, and a true measure of THAT
# subsystem's own test adequacy. The per-crate CI matrix relies on this.
test_workspace = false

# Turn off rustc lints inside mutants so a lint-as-error (e.g. an unused binding
# a mutation happens to create) can't make an otherwise-meaningful mutant report
# as "unviable" and disappear from the signal.
cap_lints = true

# The 2-core CI runner is slow, and a mutant can wedge an algorithm into a
# near-infinite loop. cargo-mutants auto-derives the per-mutant timeout from the
# baseline test time; floor it so a fast baseline can't produce a knife-edge
# timeout that flakes, and give the multiplier headroom for a starved runner.
timeout_multiplier = 5.0
minimum_test_timeout = 60

# Skip mutants that are genuinely undetectable by a unit test, so that every
# remaining survivor is actionable (a real test gap) rather than noise.
exclude_re = [
    # KeyspaceKv::sync is the fsync (PersistMode::SyncAll) tail of every durable
    # write — it guarantees power-loss durability, not clean-exit persistence.
    # Replacing it with Ok(()) is invisible to any in-process test: fjall's
    # buffers still flush on a clean drop, so a reopen sees the data either way.
    # Only a real power-cut (which no unit test can stage) tells them apart.
    "KeyspaceKv::sync",
    # Parser::expr's `l_bp < min_bp` Pratt check is an EQUIVALENT mutant under
    # `<=`: the binding-power scheme gives every operator an ODD left power
    # (1,3,5,7,9) and an EVEN right power, so the `min_bp` threadeded down is only
    # ever 0, an even right power, or 11 (unary minus) — never an odd value <= 9.
    # `l_bp` (always odd, <= 9) therefore can never EQUAL `min_bp`, so `<` and
    # `<=` decide identically on every reachable input; no test can distinguish
    # them. (The arithmetic `+`/`<` mutants in expr are NOT excluded — those are
    # killable and covered by the precedence tests.)
    "replace < with <= in Parser::expr",

    # --- SP35 numeric transcendentals (sqrt/ln/log/exp/power): equivalent mutants ---
    # The values are computed by dashu-float to a DELIBERATELY over-provisioned
    # precision (`transc_prec` = needed digits + a 16-digit guard) and only THEN
    # rounded to PostgreSQL's display scale (rscale). A mutation of any precision
    # INPUT keeps precision >= the needed digits (or pushes it higher / times out) —
    # never below the guard — so the correctly-rounded result is byte-identical. No
    # value test can distinguish these. (The result-CHANGING arithmetic — the
    # `exp·log10(base)` overflow estimate, the `16 - rweight` rscale, the power-of-ten
    # display-scale, `sqrt(0)`, and the non-exact `log(2)`/`log(5)` division scale —
    # is NOT excluded; those mutants are killed by targeted tests.)
    "replace \\+ with (-|\\*) in transc_prec", # the MAX_WEIGHT+64 clamp ceiling never binds (inputs are pre-bounded)
    "replace / with (%|\\*) in num_sqrt",      # decimal_weight/2 feeds over-provisioned precision
    "replace \\+ with (-|\\*) in num_ln",      # estimate_ln_dweight+1 feeds over-provisioned precision
    "replace \\+ with (-|\\*) in num_log10",   # estimate+1 / prec+8 / rscale*4 feed over-provisioned precision
    "replace \\* with \\+ in num_exp",         # val*log10(e) feeds over-provisioned precision
    # Redundant defensive domain guard: the outer `is_zero || negative` short-circuit
    # is ALSO enforced by the inner `bf_ln` guard, so `||`->`&&` rejects the same
    # non-positive inputs downstream — no observable change.
    "replace \\|\\| with && in num_ln",
    "replace \\|\\| with && in num_log10",
    # Unreachable f64 fallback: `BigDecimal::to_f64` returns `Some(±inf)` for every
    # finite numeric, so the `None` arm (and its sign test) is dead under all real
    # inputs; `==`->`!=` flips an unreachable branch.
    "replace == with != in num_exp",
    "replace == with != in num_power",
    # Knife-edge format boundary: `est_weight > MAX_WEIGHT` vs `>=` differ ONLY when the
    # estimate is EXACTLY MAX_WEIGHT (131071), which would require materializing a
    # 131072-digit result to observe — a benign off-by-one at the numeric-format edge.
    "replace > with >= in num_power",
    # SP33: parse_clock_term's `while frac_digits.len() < 6` pad-loop is EQUIVALENT
    # under `<=`. The loop only ever APPENDS '0', and the result is sliced
    # `frac_digits[..6]` — the first six chars. `<` stops at exactly 6 chars; `<=`
    # overshoots to 7, but `[..6]` discards the extra, so both yield the identical
    # six-digit fraction for EVERY input (proven over the full input space). The
    # `< → ==` and `< → >` mutants on the SAME line ARE killable (they stop early,
    # leaving < 6 chars → a slice panic) and are covered by the `.5`-fraction test.
    "replace < with <= in parse_clock_term",
    # SP33: format_clock's `let neg = total_micros < 0` is EQUIVALENT under `<= 0`.
    # `< 0` and `<= 0` differ ONLY at total_micros == 0, but format_clock has a
    # single caller (interval_to_text) gated by `has_clock = iv.micros != 0`, so it
    # is NEVER invoked with 0. For every value it actually sees (non-zero), the two
    # comparisons decide the sign identically; no test can distinguish them.
    "replace < with <= in format_clock",
    # SP33: accumulate_unit's year arm has `*micros += 0;` (line 774 — a documented
    # no-op: a whole/fractional YEAR contributes no microseconds). `+= 0` and
    # `-= 0` are IDENTICAL (zero is its own negation), so the `+= → -=` mutant on
    # THIS line is equivalent. The `+= → *=` mutant on the same line is NOT
    # equivalent (`*micros *= 0` wipes any micros accumulated by a prior term) and
    # is killed by `accumulate_unit_year_term_does_not_clobber_prior_micros`. The
    # exclusion is line-scoped so the killable `+= → -=` mutants on the OTHER
    # accumulate_unit lines stay in the signal.
    "datetime\\.rs:774:21: replace \\+= with -=",
    # ops.rs `arith`'s own `if a.is_null() || b.is_null()` (line 116) is EQUIVALENT
    # under `&&`. Every caller — add/sub/mul/div — already returns early on a NULL
    # operand BEFORE calling `arith`, so `arith` never observes a null: both
    # `is_null()` calls are always false, and `false || false` == `false && false`.
    # The true-branch is dead, so no test can distinguish `||` from `&&` here. (The
    # `||→&&` mutants on `arith`'s line 130 `is_numeric` check and in
    # `div`/`rem`/`compare` are NOT excluded — those guards are live and are killed
    # by the numeric/float dispatch tests.) Line-scoped so only this dead check is
    # excluded.
    "ops\\.rs:116:20: replace \\|\\| with &&",
    # ops.rs `div`'s `arith(..., |x, y| x / y, ...)` 5th arg (line 376) is the
    # FLOAT op_f8 closure, and it is DEAD on the div→arith path: `div` returns
    # before `arith` for every float operand (line 345's float fast-path) and every
    # numeric operand (line 358), so only pure-INTEGER pairs reach `arith` from
    # `div`, and `arith` invokes op_f8 only for a float operand. The closure is
    # therefore never called, so `/ → %` and `/ → *` on it are equivalent (the code
    # comment at lines 369-370 documents this dead-arg intent). Both `/`-mutants on
    # this exact line are excluded; the live integer/float division behaviour is
    # covered by `division_dispatches_float_numeric_and_integer_paths`.
    "ops\\.rs:376:18: replace / with [%*]",
    # ops.rs `compare`'s `_ if is_numeric(a) || is_numeric(b)` guard (line 465) is
    # EQUIVALENT under `... with true`. Earlier match arms already peel off text,
    # bool, every temporal pair, and (line 460) any float pair, so the only pairs
    # reaching line 465 are integer pairs or genuinely-incompatible pairs. For an
    # integer pair, the numeric arm (`as_numeric` → BigDecimal cmp) yields the
    # IDENTICAL ordering as the final integer arm (`as_i64` cmp); for an
    # incompatible pair both arms return the same `cannot_compare` error. So forcing
    # the guard true changes no observable result. (The `→ false` and `||→&&`
    # mutants on this line ARE killable — a real numeric operand needs the arm — and
    # are covered by `compare_routes_float_numeric_and_integer_pairs_distinctly`.)
    "ops\\.rs:465:14: replace match guard is_numeric\\(a\\) \\|\\| is_numeric\\(b\\) with true",
]
